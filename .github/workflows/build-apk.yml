name: Build NOX APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Create capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.nox.detective",
            "appName": "NOX",
            "webDir": "out",
            "server": {
              "url": "https://nox-ai.vercel.app",
              "cleartext": true
            }
          }
          EOF

      - name: Build web app
        run: npm run build --if-present

      - name: Initialize Capacitor android folder
        run: |
          npx cap init NOX com.nox.detective --web-dir out || true
          npx cap add android || true
          npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NOX-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

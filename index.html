<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOX | Digital Detective Assistant</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #242424;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #455a64;
            --accent-red: #8b0000;
            --border-color: #2c2c2c;
            --font-serif: 'Merriweather', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --header-height: 60px;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: var(--font-sans); 
            height: 100dvh; 
            display: flex; 
            overflow: hidden; 
            position: fixed; 
            width: 100%;
        }
        
        .nox-brand {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(139, 0, 0, 0.4);
            text-transform: uppercase;
        }

        .app-container { display: flex; width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10; display: none; opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }

        .sidebar {
            position: fixed; left: -100%; top: 0; width: var(--sidebar-width); height: 100%;
            background-color: var(--bg-secondary); border-right: 1px solid var(--border-color);
            z-index: 20; display: flex; flex-direction: column; transition: left 0.3s ease;
        }
        .sidebar.open { left: 0; }
        
        .sidebar-header {
            height: var(--header-height); padding: 0 20px; display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color);
        }
        .close-sidebar-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; }

        .new-case-btn {
            margin: 20px; padding: 12px; background-color: transparent;
            border: 1px solid var(--accent-color); color: var(--text-primary);
            font-family: var(--font-sans); border-radius: 4px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .new-case-btn:hover { background-color: var(--accent-color); }

        .archive-section { flex-grow: 1; overflow-y: auto; padding: 0 10px; }
        .archive-title {
            font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent-red);
            padding: 0 10px; margin-bottom: 10px; letter-spacing: 1px;
        }
        
        .case-list { list-style: none; min-height: 20px; }
        .case-item {
            padding: 12px 10px; margin-bottom: 5px; border-radius: 4px; cursor: pointer;
            transition: background 0.2s; position: relative; overflow: hidden;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        .case-item:hover { background-color: var(--bg-tertiary); }
        .case-item.active { background-color: var(--bg-tertiary); border-left: 3px solid var(--accent-red); }
        .case-item-text {
            font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1;
            pointer-events: none;
        }
        
        .case-delete-btn {
            background: none; border: none; color: var(--accent-red); cursor: pointer;
            font-size: 1rem; padding: 5px; display: none; margin-left: 10px;
        }
        .case-item.show-delete .case-delete-btn { display: block; }

        .main-content {
            flex: 1; display: flex; flex-direction: column; height: 100%; 
            position: relative; transition: margin-left 0.3s ease; width: 100%; min-width: 0;
        }

        .main-header {
            height: var(--header-height); padding: 0 20px; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color); background-color: var(--bg-primary);
            flex-shrink: 0;
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 15px; }
        .icon-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; }
        
        .case-info { font-family: var(--font-mono); font-size: 0.85rem; text-align: center; }

        .chat-container {
            flex: 1; padding: 20px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 25px; scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        
        .message { max-width: 85%; line-height: 1.6; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-header { font-family: var(--font-mono); font-size: 0.7rem; margin-bottom: 5px; letter-spacing: 1px; color: var(--accent-red); }
        .msg-content {
            background-color: var(--bg-secondary); padding: 15px 20px; border-radius: 2px;
            border-left: 3px solid var(--accent-color); font-family: var(--font-serif);
            font-size: 1.05rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); white-space: pre-wrap;
        }
        
        .message.user-msg { align-self: flex-end; }
        .message.user-msg .msg-header { color: var(--text-secondary); text-align: right; }
        .message.user-msg .msg-content {
            background-color: var(--bg-tertiary); border-left: none;
            border-right: 3px solid #666; font-family: var(--font-sans); font-size: 0.95rem;
        }

        .input-area { 
            flex-shrink: 0; padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); 
            background-color: var(--bg-primary); border-top: 1px solid var(--border-color); width: 100%;
        }
        .input-wrapper {
            background-color: var(--bg-secondary); border: 1px solid var(--border-color);
            padding: 10px 15px; display: flex; gap: 12px; align-items: center; border-radius: 4px;
        }
        
        textarea {
            flex-grow: 1; background: transparent; border: none; color: var(--text-primary);
            font-family: var(--font-sans); font-size: 16px; resize: none; 
            max-height: 120px; outline: none; padding: 5px 0; line-height: 1.4;
        }
        #send-btn {
            background: transparent; border: none; color: var(--accent-color);
            font-size: 1.3rem; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center;
        }

        @media (min-width: 768px) {
            .sidebar { left: -var(--sidebar-width); }
            body.sidebar-open .sidebar { left: 0; }
            body.sidebar-open .main-content { margin-left: var(--sidebar-width); }
            .input-area { padding: 20px 40px 40px 40px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="nox-brand">NOX</span>
                <button class="close-sidebar-btn" id="close-sidebar"><i class="fas fa-times"></i></button>
            </div>
            <button class="new-case-btn" id="new-case-btn"><i class="fas fa-plus"></i> New Case</button>
            <div class="archive-section">
                <div class="archive-title">CASE ARCHIVE</div>
                <ul class="case-list" id="case-list"></ul>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="icon-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
                    <span class="nox-brand">NOX</span>
                </div>
                <div class="case-info">
                    <span class="case-label">CASE_ID:</span>
                    <span class="case-id" id="case-id-display">NX-START-LOG</span>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="export-btn" title="Export Log"><i class="fas fa-download"></i></button>
                    <button class="icon-btn danger" id="clear-btn" title="Delete Current Log"><i class="fas fa-trash"></i></button>
                </div>
            </header>
            
            <div class="chat-container" id="chat-container"></div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Operator query..." rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://g4f.space/api/groq/v1/chat/completions";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const caseIdDisplay = document.getElementById('case-id-display');
        const caseListEl = document.getElementById('case-list');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar');
        const newCaseBtn = document.getElementById('new-case-btn');
        const clearBtn = document.getElementById('clear-btn');
        const exportBtn = document.getElementById('export-btn');

        let cases = [];
        let currentCaseId = null;

        const init = () => {
            loadState();
            if (cases.length === 0) createNewCase();
            else {
                currentCaseId = localStorage.getItem('nox_active_case') || cases[0].id;
                renderChat();
                renderArchive();
            }
        };

        const loadState = () => {
            const saved = localStorage.getItem('nox_cases');
            if (saved) cases = JSON.parse(saved);
        };

        const saveState = () => {
            localStorage.setItem('nox_cases', JSON.stringify(cases));
            localStorage.setItem('nox_active_case', currentCaseId);
            renderArchive();
        };

        const generateCaseId = () => 'NX-' + Math.floor(Math.random() * 9000 + 1000) + '-LOG';

        const createNewCase = () => {
            const newCase = {
                id: generateCaseId(),
                title: 'New Investigation...',
                messages: [{ role: 'assistant', content: 'System active. Neural links established. How can I assist with your investigation?' }],
                timestamp: Date.now()
            };
            cases.unshift(newCase);
            currentCaseId = newCase.id;
            saveState();
            renderChat();
            if (sidebar.classList.contains('open')) toggleSidebar();
        };

        const renderChat = () => {
            chatContainer.innerHTML = '';
            const currentCase = cases.find(c => c.id === currentCaseId);
            if (currentCase) {
                caseIdDisplay.textContent = currentCase.id;
                currentCase.messages.forEach(msg => appendMessageUI(msg.role, msg.content, false));
            }
            scrollToBottom();
        };

        const appendMessageUI = (role, content, animate = true) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-msg`;
            const label = role === 'assistant' ? 'NOX_UNIT' : 'OPERATOR';
            msgDiv.innerHTML = `<div class="msg-header">${label}</div><div class="msg-content">${content}</div>`;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        };

        const scrollToBottom = () => chatContainer.scrollTop = chatContainer.scrollHeight;

        const renderArchive = () => {
            caseListEl.innerHTML = '';
            cases.forEach(c => {
                if (!c || !c.id) return; 

                const li = document.createElement('li');
                li.className = `case-item ${c.id === currentCaseId ? 'active' : ''}`;
                
                const textSpan = document.createElement('span');
                textSpan.className = 'case-item-text';
                textSpan.textContent = c.title;

                const delBtn = document.createElement('button');
                delBtn.className = 'case-delete-btn';
                delBtn.innerHTML = '<i class="fas fa-trash"></i>';

                let pressTimer;
                const startPress = (e) => {
                    pressTimer = setTimeout(() => {
                        document.querySelectorAll('.case-item').forEach(item => item.classList.remove('show-delete'));
                        li.classList.add('show-delete');
                    }, 600);
                };
                const cancelPress = () => clearTimeout(pressTimer);

                li.addEventListener('touchstart', startPress, {passive: true});
                li.addEventListener('mousedown', startPress);
                li.addEventListener('touchend', cancelPress);
                li.addEventListener('mouseup', cancelPress);
                li.addEventListener('contextmenu', (e) => e.preventDefault());

                li.addEventListener('click', (e) => {
                    if (e.target.closest('.case-delete-btn')) return;
                    if (li.classList.contains('show-delete')) {
                        li.classList.remove('show-delete');
                        return;
                    }
                    currentCaseId = c.id;
                    saveState();
                    renderChat();
                    if (window.innerWidth < 768) toggleSidebar();
                });

                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteCase(c.id);
                });

                li.appendChild(textSpan);
                li.appendChild(delBtn);
                caseListEl.appendChild(li);
            });
        };

        const deleteCase = (id) => {
            cases = cases.filter(c => c.id !== id);
            if (cases.length === 0) {
                createNewCase();
            } else if (currentCaseId === id) {
                currentCaseId = cases[0].id;
                renderChat();
            }
            saveState();
        };

        const sendMessage = async () => {
            const message = userInput.value.trim();
            if (!message) return;
            const currentCase = cases.find(c => c.id === currentCaseId);
            if (currentCase.messages.length <= 1) currentCase.title = message.substring(0, 30);
            
            currentCase.messages.push({ role: 'user', content: message });
            appendMessageUI('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant-msg';
            typingDiv.innerHTML = `<div class="msg-header">NOX_UNIT</div><div class="msg-content">Analyzing...</div>`;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();

            try {
                const apiMessages = [{ role: "system", content: "You are NOX, a cold, analytical, yet helpful digital detective assistant. Keep your tone noir, mysterious, and concise." }];
                currentCase.messages.slice(-6).forEach(m => apiMessages.push(m));

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: apiMessages })
                });

                typingDiv.remove();
                const data = await response.json();
                const reply = data.choices[0].message.content;
                currentCase.messages.push({ role: 'assistant', content: reply });
                saveState();
                appendMessageUI('assistant', reply);
            } catch (e) {
                typingDiv.remove();
                appendMessageUI('assistant', 'SIGNAL LOST: Link unstable.');
            }
        };

        // --- FIXED EXPORT FUNCTION ---
        const downloadLog = () => {
            const currentCase = cases.find(c => c.id === currentCaseId);
            if (!currentCase) return;

            let logContent = `NOX DIGITAL DETECTIVE | INVESTIGATION LOG\n`;
            logContent += `===========================================\n`;
            logContent += `CASE_ID:   ${currentCase.id}\n`;
            logContent += `TITLE:     ${currentCase.title}\n`;
            logContent += `TIMESTAMP: ${new Date(currentCase.timestamp).toLocaleString()}\n`;
            logContent += `===========================================\n\n`;

            currentCase.messages.forEach(msg => {
                const label = msg.role === 'assistant' ? '[NOX_UNIT]' : '[OPERATOR]';
                logContent += `${label}\n${msg.content}\n\n`;
            });

            const blob = new Blob([logContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentCase.id}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        const toggleSidebar = () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
            document.body.classList.toggle('sidebar-open');
        };

        menuBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
        newCaseBtn.addEventListener('click', createNewCase);
        sendBtn.addEventListener('click', sendMessage);
        exportBtn.addEventListener('click', downloadLog); // Added listener
        userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        clearBtn.addEventListener('click', () => { if(confirm('Purge logs?')) deleteCase(currentCaseId); });

        init();
    </script>
</body>
</html>

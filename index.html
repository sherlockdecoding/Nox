            const textSpan = document.createElement('span');
            textSpan.className = 'case-item-text';
            textSpan.textContent = c.title;
            const delBtn = document.createElement('button');
            delBtn.className = 'case-delete-btn';
            delBtn.innerHTML = '<i class="fas fa-trash"></i>';

            let pressTimer;
            const startPress  = () => { pressTimer = setTimeout(() => { document.querySelectorAll('.case-item').forEach(i => i.classList.remove('show-delete')); li.classList.add('show-delete'); }, 600); };
            const cancelPress = () => clearTimeout(pressTimer);
            li.addEventListener('touchstart', startPress, {passive:true});
            li.addEventListener('mousedown',  startPress);
            li.addEventListener('touchend',   cancelPress);
            li.addEventListener('mouseup',    cancelPress);
            li.addEventListener('contextmenu', e => e.preventDefault());
            li.addEventListener('click', e => {
                if (e.target.closest('.case-delete-btn')) return;
                if (li.classList.contains('show-delete')) { li.classList.remove('show-delete'); return; }
                currentCaseId = c.id;
                saveState();
                if (isGraphView) { renderGraph(); caseIdDisplay.textContent = currentCaseId; } else renderChat();
                if (window.innerWidth < 768) toggleSidebar();
            });
            delBtn.addEventListener('click', e => { e.stopPropagation(); deleteCase(c.id); });
            li.appendChild(textSpan);
            li.appendChild(delBtn);
            caseListEl.appendChild(li);
        });
    };

    const deleteCase = (id) => {
        cases = cases.filter(c => c.id !== id);
        if (cases.length === 0) createNewCase();
        else if (currentCaseId === id) { currentCaseId = cases[0].id; if (isGraphView) renderGraph(); else renderChat(); }
        saveState();
    };

    // ─────────────────────────────────────────────
    //  CALL MODE
    // ─────────────────────────────────────────────
    const setupCallMode = () => {
        const callTriggerBtn = document.createElement('button');
        callTriggerBtn.className = 'icon-btn';
        callTriggerBtn.innerHTML = '<i class="fas fa-phone-alt"></i>';
        callTriggerBtn.title = "Call Mode";
        document.querySelector('.header-right').prepend(callTriggerBtn);

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            callTriggerBtn.addEventListener('click', () => { isCallMode = true; callOverlay.classList.add('active'); callStatus.textContent = "SECURE LINE ESTABLISHED"; });
            callEndBtn.addEventListener('click', () => { isCallMode = false; callOverlay.classList.remove('active'); recognition.stop(); window.speechSynthesis.cancel(); callSpectrum.classList.remove('active'); callMicBtn.classList.remove('listening'); });
            callMicBtn.addEventListener('click', () => { if (callMicBtn.classList.contains('listening')) recognition.stop(); else { window.speechSynthesis.cancel(); recognition.start(); } });
            recognition.onstart  = () => { callMicBtn.classList.add('listening'); callSpectrum.classList.add('active'); callStatus.textContent = "LISTENING..."; };
            recognition.onresult = e  => { userInput.value = e.results[0][0].transcript; callStatus.textContent = "TRANSMITTING..."; sendMessage(); };
            recognition.onerror  = e  => { callMicBtn.classList.remove('listening'); callSpectrum.classList.remove('active'); callStatus.textContent = "SIGNAL INTERRUPTED"; };
            recognition.onend    = () => { callMicBtn.classList.remove('listening'); if (isCallMode && callStatus.textContent !== "TRANSMITTING...") { callStatus.textContent = "AWAITING INPUT..."; callSpectrum.classList.remove('active'); } };
        } else {
            callTriggerBtn.style.display = 'none';
        }
    };

    // ── IMAGE UPLOAD BUTTON → direct EXIF processing ──
    document.getElementById('img-upload-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        e.target.value = ''; // reset so same file can be re-selected

        const exifMsg = document.createElement('div');
        exifMsg.className = 'message assistant-msg';
        exifMsg.innerHTML = `<div class="msg-header">NOX_UNIT</div><div class="msg-content">EXIF extraction module activated — processing ${escHtml(file.name)}</div>`;
        const uploader = buildExifUploader(file); // pass file directly
        exifMsg.querySelector('.msg-content').appendChild(uploader);
        chatContainer.appendChild(exifMsg);
        scrollToBottom();
    });

    // ── SPLASH: remove from DOM after animation completes ──
    const splash = document.getElementById('splash');
    splash.addEventListener('animationend', () => splash.remove());

    setupCallMode();
    init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOX | Digital Detective Assistant</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #242424;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #455a64;
            --accent-red: #8b0000;
            --border-color: #2c2c2c;
            --font-serif: 'Merriweather', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --header-height: 60px;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-primary); 
            font-family: var(--font-sans); 
            height: 100dvh; 
            display: flex; 
            overflow: hidden; 
            position: fixed; 
            width: 100%;
        }
        
        .nox-brand {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(139, 0, 0, 0.4);
            text-transform: uppercase;
        }

        .app-container { display: flex; width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10; display: none; opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }

        .sidebar {
            position: fixed; left: -100%; top: 0; width: var(--sidebar-width); height: 100%;
            background-color: var(--bg-secondary); border-right: 1px solid var(--border-color);
            z-index: 20; display: flex; flex-direction: column; transition: left 0.3s ease;
        }
        .sidebar.open { left: 0; }
        
        .sidebar-header {
            height: var(--header-height); padding: 0 20px; display: flex;
            align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color);
        }
        .close-sidebar-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; }

        .new-case-btn {
            margin: 20px; padding: 12px; background-color: transparent;
            border: 1px solid var(--accent-color); color: var(--text-primary);
            font-family: var(--font-sans); border-radius: 4px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .new-case-btn:hover { background-color: var(--accent-color); }

        .archive-section { flex-grow: 1; overflow-y: auto; padding: 0 10px; }
        .archive-title {
            font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent-red);
            padding: 0 10px; margin-bottom: 10px; letter-spacing: 1px;
        }
        
        .case-list { list-style: none; min-height: 20px; }
        .case-item {
            padding: 12px 10px; margin-bottom: 5px; border-radius: 4px; cursor: pointer;
            transition: background 0.2s; position: relative; overflow: hidden;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none; -webkit-user-select: none;
        }
        .case-item:hover { background-color: var(--bg-tertiary); }
        .case-item.active { background-color: var(--bg-tertiary); border-left: 3px solid var(--accent-red); }
        .case-item-text {
            font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1;
            pointer-events: none;
        }
        .case-delete-btn {
            background: none; border: none; color: var(--accent-red); cursor: pointer;
            font-size: 1rem; padding: 5px; display: none; margin-left: 10px;
        }
        .case-item.show-delete .case-delete-btn { display: block; }

        .main-content {
            flex: 1; display: flex; flex-direction: column; height: 100%; 
            position: relative; transition: margin-left 0.3s ease; width: 100%; min-width: 0;
        }

        .main-header {
            height: var(--header-height); padding: 0 20px; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color); background-color: var(--bg-primary);
            flex-shrink: 0;
        }
        .header-left, .header-right { display: flex; align-items: center; gap: 15px; }
        .icon-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
        .icon-btn:hover { color: var(--text-primary); }
        .icon-btn.active { color: var(--accent-red); }
        
        .case-info { font-family: var(--font-mono); font-size: 0.85rem; text-align: center; }

        .chat-container {
            flex: 1; padding: 20px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 25px; scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        
        #evidence-board {
            display: none; flex: 1; width: 100%; height: 100%; 
            background-color: var(--bg-primary); position: relative;
        }
        
        .message { max-width: 85%; line-height: 1.6; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-header { font-family: var(--font-mono); font-size: 0.7rem; margin-bottom: 5px; letter-spacing: 1px; color: var(--accent-red); }
        .msg-content {
            background-color: var(--bg-secondary); padding: 15px 20px; border-radius: 2px;
            border-left: 3px solid var(--accent-color); font-family: var(--font-serif);
            font-size: 1.05rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); white-space: pre-wrap;
        }
        
        .message.user-msg { align-self: flex-end; }
        .message.user-msg .msg-header { color: var(--text-secondary); text-align: right; }
        .message.user-msg .msg-content {
            background-color: var(--bg-tertiary); border-left: none;
            border-right: 3px solid #666; font-family: var(--font-sans); font-size: 0.95rem;
        }

        /* Gravatar UI */
        .gravatar-info {
            display: flex; align-items: center; gap: 15px; margin-top: 15px;
            padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 4px;
        }
        .gravatar-img { width: 50px; height: 50px; border-radius: 4px; border: 1px solid var(--accent-color); }
        .gravatar-name { font-family: var(--font-mono); font-size: 0.8rem; color: #fff; letter-spacing: 1px; }

        /* ── SPATIAL INTERCEPT MAP ── */
        .nox-map-block {
            margin-top: 16px;
            border: 1px solid var(--accent-color);
            border-radius: 3px;
            overflow: hidden;
            background: #0d0d0d;
        }
        .nox-map-header {
            background: rgba(139,0,0,0.15);
            border-bottom: 1px solid var(--accent-color);
            padding: 8px 14px;
            display: flex; align-items: center; gap: 10px;
            font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 1.5px;
            color: var(--accent-red);
        }
        .nox-map-header .blink {
            width: 7px; height: 7px; border-radius: 50%; background: var(--accent-red);
            animation: blink-dot 1.2s infinite;
        }
        @keyframes blink-dot { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
        .nox-map-canvas {
            width: 100%; height: 220px;
        }
        .nox-map-footer {
            padding: 10px 14px;
            font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            line-height: 1.7;
        }
        .nox-map-footer .coord-line { color: #7fba8a; }
        .nox-map-footer .alt-line { color: var(--text-secondary); }
        .nox-map-footer .alt-line span { color: #c8a96e; }

        /* ── IP LOOKUP CARD ── */
        .ip-card {
            margin-top: 15px; border: 1px solid var(--accent-color); border-radius: 3px;
            background: rgba(0,0,0,0.3); overflow: hidden; font-family: var(--font-mono);
        }
        .ip-card-header {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            background: rgba(69,90,100,0.2); border-bottom: 1px solid var(--border-color);
        }
        .ip-flag { border: 1px solid var(--border-color); border-radius: 2px; flex-shrink: 0; }
        .ip-address { font-size: 0.85rem; color: #7fba8a; letter-spacing: 1px; flex-grow: 1; }
        .ip-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 2px; letter-spacing: 1px; }
        .ip-tag.proxy   { background: rgba(139,0,0,0.4); color: #ff6b6b; border: 1px solid #8b0000; }
        .ip-tag.hosting { background: rgba(69,90,100,0.4); color: #aac; border: 1px solid #455a64; }
        .ip-grid { padding: 10px 14px; display: flex; flex-direction: column; gap: 5px; }
        .ip-row { display: flex; gap: 12px; font-size: 0.72rem; }
        .ip-k { color: var(--accent-red); min-width: 72px; flex-shrink: 0; }
        .ip-v { color: var(--text-primary); word-break: break-all; }

        /* ── SHARED OSINT CARD BASE ── */
        .osint-card {
            margin-top: 15px; border: 1px solid var(--accent-color); border-radius: 3px;
            background: rgba(0,0,0,0.3); overflow: hidden; font-family: var(--font-mono);
        }
        .osint-card-header {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            background: rgba(69,90,100,0.2); border-bottom: 1px solid var(--border-color);
            font-size: 0.72rem; letter-spacing: 1.5px; color: var(--accent-red);
        }
        .osint-card-header .blink {
            width: 7px; height: 7px; border-radius: 50%; background: var(--accent-red);
            animation: blink-dot 1.2s infinite; flex-shrink: 0;
        }
        .osint-card-title { flex-grow: 1; }
        .osint-grid { padding: 10px 14px; display: flex; flex-direction: column; gap: 5px; }
        .osint-row { display: flex; gap: 12px; font-size: 0.72rem; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 4px; }
        .osint-k { color: var(--accent-red); min-width: 90px; flex-shrink: 0; }
        .osint-v { color: var(--text-primary); word-break: break-all; line-height: 1.5; }
        .osint-v a { color: #7fba8a; text-decoration: none; }
        .osint-v a:hover { text-decoration: underline; }
        .osint-section-title { font-size: 0.68rem; color: var(--text-secondary); letter-spacing: 1px; margin: 8px 0 4px; }

        /* Username results */
        .username-grid { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 6px; }
        .username-chip {
            font-size: 0.68rem; padding: 4px 8px; border-radius: 2px; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 5px;
        }
        .username-chip.found   { background: rgba(127,186,138,0.15); border: 1px solid #7fba8a; color: #7fba8a; }
        .username-chip.notfound{ background: rgba(255,255,255,0.04); border: 1px solid #333; color: #555; }
        .username-chip .dot    { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .username-chip.found .dot   { background: #7fba8a; }
        .username-chip.notfound .dot{ background: #444; }

        /* Breach badges */
        .breach-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
        .breach-item {
            font-size: 0.72rem; padding: 6px 10px; border-radius: 2px;
            border-left: 3px solid var(--accent-red); background: rgba(139,0,0,0.1);
        }
        .breach-name { color: #ff6b6b; margin-bottom: 2px; }
        .breach-meta { color: var(--text-secondary); font-size: 0.65rem; }

        /* EXIF */
        .exif-upload-area {
            margin-top: 15px; border: 1px dashed var(--accent-color); border-radius: 3px;
            padding: 20px; text-align: center; cursor: pointer; font-family: var(--font-mono);
            font-size: 0.8rem; color: var(--text-secondary); transition: all 0.2s;
            background: rgba(0,0,0,0.2);
        }
        .exif-upload-area:hover { border-color: var(--accent-red); color: var(--text-primary); }
        .exif-upload-area input { display: none; }

        /* ── IMAGE UPLOAD BUTTON ── */
        .img-upload-label { cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .img-upload-label:hover { color: var(--text-primary); }
        #img-upload-input { display: none; }

        /* ── DISCLAIMER ── */
        .disclaimer {
            text-align: center; font-family: var(--font-mono); font-size: 0.62rem;
            color: #3a3a3a; padding-top: 6px; letter-spacing: 0.5px;
            user-select: none; -webkit-user-select: none;
        }

        /* ── SPLASH SCREEN ── */
        .splash {
            position: fixed; inset: 0; z-index: 99999;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            animation: splash-exit 0.6s ease 3.5s forwards;
        }
        @keyframes splash-exit {
            0%   { opacity: 1; pointer-events: auto; }
            90%  { opacity: 1; pointer-events: auto; }
            100% { opacity: 0; pointer-events: none; }
        }
        .splash-logo-glow {
            animation: logo-pulse 2s ease-in-out 1.2s infinite;
        }
        @keyframes logo-pulse {
            0%,100% { text-shadow: 0 0 40px rgba(139,0,0,0.6), 0 0 80px rgba(139,0,0,0.2); }
            50%     { text-shadow: 0 0 60px rgba(139,0,0,0.9), 0 0 120px rgba(139,0,0,0.4), 0 0 200px rgba(139,0,0,0.1); }
        }
        .splash-scanline {
            position: absolute; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(139,0,0,0.4), transparent);
            animation: scanline 2.5s linear 1s infinite;
        }
        @keyframes scanline {
            0%   { top: 0%; opacity: 0; }
            5%   { opacity: 1; }
            95%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .splash-inner {
            display: flex; flex-direction: column; align-items: center; gap: 18px;
        }
        .splash-bars {
            display: flex; gap: 8px; align-items: flex-end; height: 40px; margin-bottom: 8px;
        }
        .splash-bar {
            width: 4px; border-radius: 4px; background: var(--accent-red);
            box-shadow: 0 0 12px rgba(139,0,0,0.8);
            animation: splash-bar-rise 0.6s ease forwards;
            transform-origin: bottom;
            opacity: 0;
        }
        .splash-bar:nth-child(1) { height: 20px; animation-delay: 0.1s; animation-duration: 0.5s; }
        .splash-bar:nth-child(2) { height: 36px; animation-delay: 0.25s; animation-duration: 0.5s; }
        .splash-bar:nth-child(3) { height: 26px; animation-delay: 0.4s; animation-duration: 0.5s; }
        @keyframes splash-bar-rise {
            from { opacity: 0; transform: scaleY(0); }
            to   { opacity: 1; transform: scaleY(1); }
        }
        .splash-logo {
            font-family: 'Merriweather', serif;
            font-weight: 700;
            font-size: clamp(3.5rem, 12vw, 6rem);
            letter-spacing: 18px;
            color: #fff;
            text-shadow: 0 0 40px rgba(139,0,0,0.6), 0 0 80px rgba(139,0,0,0.2);
            animation: splash-logo-in 1s cubic-bezier(0.16,1,0.3,1) 0.4s both;
            text-transform: uppercase;
        }
        @keyframes splash-logo-in {
            0%   { opacity: 0; letter-spacing: 80px; filter: blur(8px); }
            50%  { opacity: 0.8; letter-spacing: 12px; filter: blur(1px); }
            75%  { letter-spacing: 20px; }
            100% { opacity: 1; letter-spacing: 18px; filter: blur(0); }
        }
        .splash-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--accent-red);
            text-transform: uppercase;
            animation: splash-sub-in 0.6s ease 1.3s both;
        }
        @keyframes splash-sub-in {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .splash-line {
            height: 1px; background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
            animation: splash-line-grow 0.8s ease 1.8s both;
            width: 0;
        }
        @keyframes splash-line-grow {
            from { width: 0; opacity: 0; }
            to   { width: 260px; opacity: 1; }
        }

        /* Custom Leaflet dark overrides */
        .leaflet-container { background: #0d0d0d !important; }
        .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(0.75) contrast(1.1); }
        .leaflet-control-zoom a { background: var(--bg-secondary) !important; color: var(--text-primary) !important; border-color: var(--border-color) !important; }

        .input-area { 
            flex-shrink: 0; padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); 
            background-color: var(--bg-primary); border-top: 1px solid var(--border-color); width: 100%;
        }
        .input-wrapper {
            background-color: var(--bg-secondary); border: 1px solid var(--border-color);
            padding: 10px 15px; display: flex; gap: 12px; align-items: center; border-radius: 4px;
        }
        textarea {
            flex-grow: 1; background: transparent; border: none; color: var(--text-primary);
            font-family: var(--font-sans); font-size: 16px; resize: none; 
            max-height: 120px; outline: none; padding: 5px 0; line-height: 1.4;
        }
        #send-btn {
            background: transparent; border: none; color: var(--accent-color);
            font-size: 1.3rem; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center;
        }

        @media (min-width: 768px) {
            .sidebar { left: -var(--sidebar-width); }
            body.sidebar-open .sidebar { left: 0; }
            body.sidebar-open .main-content { margin-left: var(--sidebar-width); }
            .input-area { padding: 20px 40px 40px 40px; }
        }

        #node-delete-btn {
            position: absolute; display: none;
            background: var(--accent-red); color: white; border: none; border-radius: 50%;
            width: 30px; height: 30px; cursor: pointer; z-index: 100;
            justify-content: center; align-items: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); font-size: 14px;
        }

        /* CALL MODE */
        .call-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18,18,18,0.96); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .call-overlay.active { opacity: 1; pointer-events: auto; }
        .call-status {
            font-family: var(--font-mono); color: var(--text-secondary);
            margin-bottom: 50px; letter-spacing: 2px; text-transform: uppercase; font-size: 1rem;
        }
        .spectrum-container {
            display: flex; align-items: center; gap: 10px; height: 120px; margin-bottom: 80px;
        }
        .spectrum-bar {
            width: 14px; height: 20px; background-color: var(--accent-red);
            border-radius: 8px; transition: height 0.15s ease;
            box-shadow: 0 0 15px rgba(139,0,0,0.8);
        }
        .spectrum-container.active .spectrum-bar { animation: pulse-wave 1.2s ease-in-out infinite; }
        .spectrum-container.active .spectrum-bar:nth-child(1) { animation-delay: 0.0s; }
        .spectrum-container.active .spectrum-bar:nth-child(2) { animation-delay: 0.15s; }
        .spectrum-container.active .spectrum-bar:nth-child(3) { animation-delay: 0.3s; }
        .spectrum-container.active .spectrum-bar:nth-child(4) { animation-delay: 0.45s; }
        .spectrum-container.active .spectrum-bar:nth-child(5) { animation-delay: 0.6s; }
        @keyframes pulse-wave { 0%,100%{height:20px;} 50%{height:100px;} }

        .call-controls { display: flex; gap: 50px; align-items: center; }
        .call-btn {
            width: 70px; height: 70px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; cursor: pointer; transition: all 0.2s;
            color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .call-btn-end { background-color: #333; }
        .call-btn-end:hover { background-color: #555; }
        .call-btn-mic { background-color: var(--accent-red); }
        .call-btn-mic:hover { background-color: #a00000; }
        .call-btn-mic.listening { 
            background-color: #ff2222; 
            box-shadow: 0 0 25px rgba(255,34,34,0.6); 
            animation: pulse-mic 1.5s infinite;
        }
        @keyframes pulse-mic { 0%{transform:scale(1);} 50%{transform:scale(1.05);} 100%{transform:scale(1);} }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="nox-brand">NOX</span>
                <button class="close-sidebar-btn" id="close-sidebar"><i class="fas fa-times"></i></button>
            </div>
            <button class="new-case-btn" id="new-case-btn"><i class="fas fa-plus"></i> New Case</button>
            <div class="archive-section">
                <div class="archive-title">CASE ARCHIVE</div>
                <ul class="case-list" id="case-list"></ul>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="icon-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
                    <span class="nox-brand">NOX</span>
                </div>
                <div class="case-info">
                    <span class="case-label">CASE_ID:</span>
                    <span class="case-id" id="case-id-display">NX-START-LOG</span>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="graph-toggle-btn" title="Toggle Evidence Board"><i class="fas fa-project-diagram"></i></button>
                    <button class="icon-btn" id="export-btn" title="Export Log"><i class="fas fa-download"></i></button>
                    <button class="icon-btn danger" id="clear-btn" title="Delete Current Log"><i class="fas fa-trash"></i></button>
                </div>
            </header>
            
            <div class="chat-container" id="chat-container"></div>
            <div id="evidence-board"></div>
            <button id="node-delete-btn"><i class="fas fa-trash"></i></button>

            <div class="input-area">
                <div class="input-wrapper">
                    <label class="icon-btn img-upload-label" title="Attach image for EXIF analysis">
                        <i class="fas fa-paperclip"></i>
                        <input type="file" id="img-upload-input" accept="image/*" style="display:none">
                    </label>
                    <textarea id="user-input" placeholder="Operator query..." rows="1"></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="disclaimer">NOX can make mistakes. Double-check information.</div>
            </div>
        </main>
    </div>

    <!-- SPLASH SCREEN -->
    <div class="splash" id="splash">
        <div class="splash-scanline"></div>
        <div class="splash-inner">
            <div class="splash-bars">
                <div class="splash-bar"></div>
                <div class="splash-bar"></div>
                <div class="splash-bar"></div>
            </div>
            <div class="splash-logo splash-logo-glow">NOX</div>
            <div class="splash-sub">DIGITAL DETECTIVE SYSTEM</div>
            <div class="splash-line" id="splash-line"></div>
        </div>
    </div>

    <div class="call-overlay" id="call-overlay">
        <div class="call-status" id="call-status">SECURE LINE ESTABLISHED</div>
        <div class="spectrum-container" id="call-spectrum">
            <div class="spectrum-bar"></div>
            <div class="spectrum-bar"></div>
            <div class="spectrum-bar"></div>
            <div class="spectrum-bar"></div>
            <div class="spectrum-bar"></div>
        </div>
        <div class="call-controls">
            <button class="call-btn call-btn-end" id="call-btn-end" title="End Call"><i class="fas fa-times"></i></button>
            <button class="call-btn call-btn-mic" id="call-btn-mic" title="Push to Talk"><i class="fas fa-microphone"></i></button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
    <script>
    // ─────────────────────────────────────────────
    //  CONFIG
    // ─────────────────────────────────────────────
    const API_URL = "https://hermes.ai.unturf.com/v1/chat/completions";

    const chatContainer     = document.getElementById('chat-container');
    const evidenceBoard     = document.getElementById('evidence-board');
    const userInput         = document.getElementById('user-input');
    const sendBtn           = document.getElementById('send-btn');
    const caseIdDisplay     = document.getElementById('case-id-display');
    const caseListEl        = document.getElementById('case-list');
    const sidebar           = document.getElementById('sidebar');
    const sidebarOverlay    = document.getElementById('sidebar-overlay');
    const menuBtn           = document.getElementById('menu-btn');
    const closeSidebarBtn   = document.getElementById('close-sidebar');
    const newCaseBtn        = document.getElementById('new-case-btn');
    const clearBtn          = document.getElementById('clear-btn');
    const exportBtn         = document.getElementById('export-btn');
    const graphToggleBtn    = document.getElementById('graph-toggle-btn');
    const callOverlay       = document.getElementById('call-overlay');
    const callSpectrum      = document.getElementById('call-spectrum');
    const callMicBtn        = document.getElementById('call-btn-mic');
    const callEndBtn        = document.getElementById('call-btn-end');
    const callStatus        = document.getElementById('call-status');

    let cases         = [];
    let currentCaseId = null;
    let isGraphView   = false;
    let isCallMode    = false;
    let network       = null;
    let mapInstances  = {};

    // ─────────────────────────────────────────────
    //  STATE
    // ─────────────────────────────────────────────
    const init = () => {
        loadState();
        if (cases.length === 0) createNewCase();
        else {
            currentCaseId = localStorage.getItem('nox_active_case') || cases[0].id;
            renderChat();
            renderArchive();
        }
    };
    const loadState  = () => { const s = localStorage.getItem('nox_cases'); if (s) cases = JSON.parse(s); };
    const saveState  = () => { localStorage.setItem('nox_cases', JSON.stringify(cases)); localStorage.setItem('nox_active_case', currentCaseId); renderArchive(); };
    const generateCaseId = () => 'NX-' + Math.floor(Math.random() * 9000 + 1000) + '-LOG';

    const createNewCase = () => {
        const newCase = {
            id: generateCaseId(),
            title: 'New Investigation...',
            messages: [{ role: 'assistant', content: 'System active. Neural links established. How can I assist with your investigation?' }],
            timestamp: Date.now()
        };
        cases.unshift(newCase);
        currentCaseId = newCase.id;
        saveState();
        if (isGraphView) renderGraph(); else renderChat();
        if (sidebar.classList.contains('open')) toggleSidebar();
    };

    // ─────────────────────────────────────────────
    //  RENDER CHAT
    // ─────────────────────────────────────────────
    const renderChat = () => {
        chatContainer.innerHTML = '';
        mapInstances = {};
        const currentCase = cases.find(c => c.id === currentCaseId);
        if (currentCase) {
            caseIdDisplay.textContent = currentCase.id;
            currentCase.messages.forEach(msg => appendMessageUI(msg.role, msg.content, false));
        }
        scrollToBottom();
    };

    const appendMessageUI = (role, content, animate = true) => {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}-msg`;
        const label = role === 'assistant' ? 'NOX_UNIT' : 'OPERATOR';

        const mapMatch = content.match(/<!--NOXMAP:([\s\S]*?)-->/);
        let prose = content.replace(/<!--NOXMAP:[\s\S]*?-->/g, '').trim();

        msgDiv.innerHTML = `<div class="msg-header">${label}</div><div class="msg-content">${prose}</div>`;
        chatContainer.appendChild(msgDiv);

        if (mapMatch) {
            try {
                const mapData = JSON.parse(mapMatch[1]);
                const mapBlock = buildMapBlock(mapData);
                msgDiv.querySelector('.msg-content').appendChild(mapBlock);
            } catch(e) { console.error('NOX_MAP_PARSE_ERR', e); }
        }

        scrollToBottom();
    };

    // ─────────────────────────────────────────────
    //  MAP BLOCK BUILDER
    // ─────────────────────────────────────────────
    const buildMapBlock = (data) => {
        const mapId = 'nox-map-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);

        const block = document.createElement('div');
        block.className = 'nox-map-block';

        const altsHtml = data.alternates && data.alternates.length
            ? data.alternates.map((a,i) =>
                `<div class="alt-line">ALT_${String(i+1).padStart(2,'0')}: <span>${escHtml(a.name)}</span> — ${a.lat.toFixed(5)}, ${a.lon.toFixed(5)}</div>`
              ).join('')
            : '<div class="alt-line">NO_ALTERNATES_FOUND</div>';

        block.innerHTML = `
            <div class="nox-map-header">
                <div class="blink"></div>
                SPATIAL_INTERCEPT :: ${escHtml(data.query.toUpperCase())}
            </div>
            <div class="nox-map-canvas" id="${mapId}"></div>
            <div class="nox-map-footer">
                <div class="coord-line">▸ PRIMARY TARGET: ${escHtml(data.primary.name)}</div>
                <div class="coord-line">  LAT: ${data.primary.lat.toFixed(6)} | LON: ${data.primary.lon.toFixed(6)}</div>
                ${altsHtml}
            </div>`;

        setTimeout(() => {
            const mapEl = document.getElementById(mapId);
            if (!mapEl) return;
            const m = L.map(mapId, { zoomControl: true, attributionControl: false }).setView([data.primary.lat, data.primary.lon], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);

            const redIcon = L.divIcon({
                className: '',
                html: `<div style="width:14px;height:14px;border-radius:50%;background:#8b0000;border:2px solid #ff4444;box-shadow:0 0 10px rgba(139,0,0,0.8);"></div>`,
                iconSize: [14,14], iconAnchor:[7,7]
            });
            L.marker([data.primary.lat, data.primary.lon], {icon: redIcon})
             .addTo(m)
             .bindPopup(`<b>${data.primary.name}</b><br>${data.primary.type||''}<br>${data.primary.address||''}`);

            if (data.alternates) {
                data.alternates.forEach(a => {
                    const greyIcon = L.divIcon({
                        className: '',
                        html: `<div style="width:10px;height:10px;border-radius:50%;background:#455a64;border:1.5px solid #7a9aaa;"></div>`,
                        iconSize:[10,10], iconAnchor:[5,5]
                    });
                    L.marker([a.lat, a.lon], {icon: greyIcon}).addTo(m).bindPopup(`<b>${a.name}</b>`);
                });
            }

            mapInstances[mapId] = m;
            m.invalidateSize();
        }, 100);

        return block;
    };

    const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const scrollToBottom = () => chatContainer.scrollTop = chatContainer.scrollHeight;

    // ─────────────────────────────────────────────
    //  AI-DRIVEN SPATIAL INTENT DETECTION
    //  Returns null or { query, city, places: [{label, osm_tags}] }
    //  Supports multiple place types mentioned in one message
    // ─────────────────────────────────────────────
    const detectSpatialIntent = async (userText) => {
        const systemPrompt = `You are a spatial intent classifier for a detective investigation app.
Analyse the operator message and decide if any real-world places need to be looked up on a map.
Extract EVERY distinct place type mentioned, even if described indirectly or in any word order.

Reply ONLY with raw JSON, no markdown fences, no explanation:
{
  "needs_map": true,
  "query": "short human label, e.g. 'fountain and library in London'",
  "city": "city/region name or null",
  "places": [
    { "label": "fountain", "osm_tags": {"amenity":"fountain"} },
    { "label": "library",  "osm_tags": {"amenity":"library"} }
  ]
}

If no real place lookup is needed set needs_map to false and places to [].

Common OSM tag mappings (use these exactly):
fountain→{"amenity":"fountain"}, cafe→{"amenity":"cafe"}, restaurant→{"amenity":"restaurant"},
hospital→{"amenity":"hospital"}, park→{"leisure":"park"}, museum→{"tourism":"museum"},
hotel→{"tourism":"hotel"}, bar/pub→{"amenity":"bar"}, pharmacy→{"amenity":"pharmacy"},
police→{"amenity":"police"}, library→{"amenity":"library"}, school→{"amenity":"school"},
church/mosque/temple/synagogue→{"amenity":"place_of_worship"}, beach→{"natural":"beach"},
supermarket→{"shop":"supermarket"}, cinema→{"amenity":"cinema"}, stadium→{"leisure":"stadium"},
train station→{"railway":"station"}, airport→{"aeroway":"aerodrome"}, bank→{"amenity":"bank"},
atm→{"amenity":"atm"}, petrol/gas→{"amenity":"fuel"}, parking→{"amenity":"parking"},
castle→{"historic":"castle"}, monument→{"historic":"monument"}, market→{"amenity":"marketplace"},
post office→{"amenity":"post_office"}, prison→{"amenity":"prison"}, embassy→{"amenity":"embassy"},
harbour/marina→{"leisure":"marina"}, bridge→{"man_made":"bridge"}, tower→{"man_made":"tower"},
zoo→{"tourism":"zoo"}, university→{"amenity":"university"}, college→{"amenity":"college"}`;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "adamo1139/Hermes-3-Llama-3.1-8B-FP8-Dynamic",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userText }
                    ],
                    temperature: 0.0,
                    max_tokens: 300
                })
            });
            const data = await response.json();
            const raw = data.choices[0].message.content.trim().replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(raw);
            if (!parsed.needs_map || !parsed.places?.length) return null;
            return parsed;
        } catch(e) {
            console.error('NOX_INTENT_ERR', e);
            return null;
        }
    };

    // ─────────────────────────────────────────────
    //  SPATIAL INTERCEPT PIPELINE (Overpass + Nominatim)
    // ─────────────────────────────────────────────
    const geocodeCity = async (city) => {
        const r = await fetch(`/api/geocode?q=${encodeURIComponent(city)}`);
        const d = await r.json();
        if (!d.length) return null;
        const b = d[0].boundingbox;
        return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon), bbox: b, name: d[0].display_name };
    };

    const overpassFetch = async (ql) => {
        const r = await fetch('/api/overpass', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ql })
        });
        return await r.json();
    };

    const normaliseElements = (elements, fallbackLabel) =>
        elements.map(el => ({
            name: el.tags?.name || el.tags?.['name:en'] || fallbackLabel,
            lat:  el.lat || el.center?.lat,
            lon:  el.lon || el.center?.lon,
            type: Object.entries(el.tags||{})
                    .filter(([k]) => ['amenity','tourism','leisure','natural','shop','railway','aeroway','historic','man_made'].includes(k))
                    .map(([k,v]) => `${k}=${v}`).join(' '),
            address: [el.tags?.['addr:street'], el.tags?.['addr:housenumber'], el.tags?.['addr:city']].filter(Boolean).join(' ')
        })).filter(el => el.lat && el.lon);

    // Takes the intent object from detectSpatialIntent and fetches real locations
    // Runs one Overpass query per place type, merges all results
    const runSpatialIntercept

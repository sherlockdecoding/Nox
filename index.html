<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOX | Development Phase</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=JetBrains+Mono:wght@400;500&display=swap">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --accent-red: #8b0000;
            --text-primary: #e0e0e0;
            --border-dim: #222;
            --font-serif: 'Merriweather', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .container {
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border-dim);
            background: rgba(10, 10, 10, 0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .container::before {
            content: "CLASSIFIED";
            position: absolute;
            top: -10px;
            right: 20px;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            letter-spacing: 2px;
        }

        .nox-logo {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 3.5rem;
            letter-spacing: 10px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--accent-red);
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .dev-status {
            text-align: left;
            border-left: 2px solid var(--accent-red);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .status-line {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #888;
        }

        .status-line b {
            color: var(--text-primary);
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #1a1a1a;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            width: 87%;
            height: 100%;
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <div class="nox-logo">NOX</div>
        <div class="subtitle">DIGITAL DETECTIVE</div>
        
        <div class="dev-status">
            <div class="status-line">PROJECT: <b>REDACTED</b></div>
            <div class="status-line">PHASE: <b>CORE_REBUILD_V2</b></div>
            <div class="status-line">STATUS: <b>OFFLINE / IN-DEV</b></div>
            
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div style="font-size: 0.6rem; margin-top: 5px; color: #555; text-align: right;">COMPILE_STAGE: 87%</div>
        </div>

        <p style="font-size: 0.85rem; color: #aaa; line-height: 1.6;">
            The terminal is currently undergoing a structural overhaul. Investigation protocols are suspended until further notice.
        </p>

        <div class="footer">Check back when the signal stabilizes.</div>
    </div>
</body>
</html>
